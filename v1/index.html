<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">

<title>Delimitation Reality Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
}

body.lang-te {
  font-family: "Noto Sans Telugu", "Noto Sans", Arial, sans-serif;
}

/* LEFT PANEL */
.panel{
  width:360px;
  background:rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding:14px;
  border-radius:0;
  box-shadow:2px 0 18px rgba(0,0,0,0.15);
  border-right:1px solid rgba(0,0,0,0.06);
  font-size:13px;
  overflow-y:auto;
  -webkit-overflow-scrolling: touch;
}

/* ================== TELUGU MODE ================== */
body.lang-te .panel {
  font-size: 14px;
  line-height: 1.6;
  letter-spacing: 0.2px;
}
body.lang-te b { display: inline-block; margin-bottom: 4px; }
body.lang-te .small { font-size: 12px; line-height: 1.6; }

/* ================== MOBILE APP LAYOUT ================== */
@media (max-width: 768px){
  body { flex-direction: column; }
  #map { height: 100vh; width: 100%; position: absolute; top:0; left:0; }
  
  .panel {
    position: fixed;   
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 75vh;
    padding: 25px 14px 14px; /* Space for drag handle */
    background: rgba(255,255,255,0.95);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 20px rgba(0,0,0,0.15);
    z-index: 1000;
    transform: translateY(calc(75vh - 80px)); /* Peek amount default */
    transition: transform 0.3s ease;
    touch-action: pan-y; /* allow scrolling inside */
  }
  .panel-handle{
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 5px;
    background: #bbb;
    border-radius: 10px;
  }
  #toggleBtn { display: none; } /* Hide toggle button on mobile to rely on bottom sheet */
}

#toggleBtn{
  position: fixed;        
  top: 20px; left: 10px;             
  width: 36px; height: 36px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 50%;
  display: flex;
  align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 9999;
}

.row{margin-top:6px}
.small{font-size:11px; opacity:0.8}
hr{border:none;border-top:1px solid #eee;margin:10px 0}
.legend{font-size:11px; margin-top:8px}
.badge{display:inline-block; padding:2px 6px; border-radius:6px; background:#f2f2f2}

button, select {
  margin-top:8px; width:100%; padding:8px; border-radius:8px;
  border:1px solid #ddd; background:#fafafa; cursor:pointer;
}
button:hover{background:#f0f0f0}

/* 🔥 BASE MAP (ALL DEVICES) */
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

/* 🔥 DESKTOP LAYOUT WITH COLLAPSE LOGIC */
@media (min-width: 768px){
  #panel{
    position: absolute; top: 0; left: 0; bottom: auto;
    width: 320px; height: 100vh; overflow-y: scroll;
    z-index: 1000; border-radius: 0;
    transform: translateX(0) !important; 
  }
  #map{ left: 320px; }
  
  body.panel-collapsed #panel { transform: translateX(-100%) !important; }
  body.panel-collapsed #map { left: 0; }
}

/* 🔥 SMOOTH ANIMATION */
#map { transition: left 0.25s ease; will-change: left; }
#panel { transition: transform 0.25s ease; will-change: transform; }

.state-label div, .ut-label div{
  pointer-events:none; white-space:nowrap; display:block; padding:1px 2px;
  text-shadow: 0 0 4px rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<div class="panel" id="panel">

  <div class="row">
    <select id="mode" onchange="updateMap(true)">

      <option value="uniform">Uniform (850)</option>

    <select id="lang" onchange="setLang(this.value)">

      <option value="te">తెలుగు</option>

  <hr><b id="insightsTitle">🔥 Key Insights</b><div id="insights" class="small"></div>
  <hr><b id="topMoversTitle">🏆 Top Movers</b><div id="topMovers" class="small"></div>

</div>

<div id="map"></div>

<script>
// ================== NORMALIZATION ==================
function normalizeName(name){

  const map = {
    "Jammu & Kashmir":"Jammu and Kashmir", "NCT of Delhi":"Delhi",

    "Andaman & Nicobar":"Andaman and Nicobar Islands",

    "Nicobar":"Andaman and Nicobar Islands",

// ================== LANGUAGE ==================

  "Uttar Pradesh":"ఉత్తర ప్రదేశ్","Maharashtra":"మహారాష్ట్ర","West Bengal":"పశ్చిమ బెంగాల్",
  "Bihar":"బీహార్","Tamil Nadu":"తమిళనాడు","Madhya Pradesh":"మధ్యప్రదేశ్",

  "Telangana":"తెలంగాణ","Kerala":"కేరళ","Odisha":"ఒడిశా","Rajasthan":"రాజస్థాన్",
  "Punjab":"పంజాబ్","Haryana":"హర్యానా","Delhi":"దిల్లీ","Jammu and Kashmir":"జమ్మూ కాశ్మీర్",
  "Ladakh":"లడఖ్","Assam":"అస్సాం","Jharkhand":"ఝార్ఖండ్","Chhattisgarh":"ఛత్తీస్‌గఢ్",

  "Chandigarh":"చండీగఢ్","Andaman and Nicobar Islands":"అండమాన్ నికోబార్ దీవులు",
  "Dadra and Nagar Haveli and Daman and Diu":"దాద్రా నాగర్ హవేలి & దమన్ దియు"
};

function t(name){

  if(lang === "te") return TELUGU[name] || name;
  return name;
}

const UI = {
  en: {
    total:"Total", model:"Model", gain:"Biggest Gain", loss:"Biggest Loss",
    gainers:"Top Gainers", losers:"Top Losers", shareTitle:"Share (South vs North)",
    standard:"Standard (incl Delhi & J&K)", sensitivity:"Sensitivity (excl Delhi & J&K)",
    south:"South", north:"North", vote:"Vote Weight (people per MP)", validation:"Validation",
    seats:"Seats", modelLabel:"Model", deltaCurrent:"Δ vs Current", deltaUniform:"Δ vs Uniform",
    share:"Share", shareDelta:"Share Δ", legendGain:"Border = Gain vs baseline",
    legendLoss:"Border = Loss vs baseline", legendFill:"Fill = State identity",
    legendBase:"Baseline: Uniform vs Current | 2011/2026 vs Uniform"
  },
  te: {

    gainers:"లాభపడిన రాష్ట్రాలు", losers:"నష్టపోయిన రాష్ట్రాలు", shareTitle:"వాటా (దక్షిణం vs ఉత్తరం)",
    standard:"సాధారణ (దిల్లీ & జమ్మూ కాశ్మీర్‌తో)", sensitivity:"సెన్సిటివిటీ (దిల్లీ & జమ్మూ కాశ్మీర్ లేకుండా)",
    south:"దక్షిణం", north:"ఉత్తరం", vote:"ఓటు బరువు (ప్రతి ఎంపీకి జనాభా)", validation:"ధృవీకరణ",
    seats:"సీట్లు", modelLabel:"మోడల్", deltaCurrent:"ప్రస్తుతంతో మార్పు", deltaUniform:"సమాన పంపిణీతో మార్పు",
    share:"వాటా", shareDelta:"వాటా మార్పు", legendGain:"సరిహద్దు = లాభం", legendLoss:"సరిహద్దు = నష్టం",
    legendFill:"రంగు = రాష్ట్రం", legendBase:"ఆధారం: సమాన పంపిణీ vs ప్రస్తుత"
  }
};

function ui(){
  let lang = document.getElementById("lang")?.value || "en";
  return UI[lang];
}

// ================== COLOR ==================
function getColor(state){
 let hash = 0;
 for(let i=0;i<state.length;i++){ hash = state.charCodeAt(i) + ((hash<<5)-hash); }
 let hue = (hash % 360 + 360) % 360;
 return `hsl(${hue},45%,70%)`;
}

// ================== DATA ==================
const CURRENT = {
"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,
"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,
"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,
"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,
"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,
"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,
"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,
"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,
"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2
};

const POP_2011 = {
"Uttar Pradesh":199812341,"Maharashtra":112374333,"Bihar":104099452,
"West Bengal":91276115,"Madhya Pradesh":72626809,"Tamil Nadu":72147030,
"Rajasthan":68548437,"Karnataka":61095297,"Gujarat":60439692,
"Andhra Pradesh":49577103,"Telangana":35193978,"Odisha":41974218,
"Kerala":33406061,"Jharkhand":32988134,"Assam":31205576,
"Punjab":27743338,"Chhattisgarh":25545198,"Haryana":25351462,
"Himachal Pradesh":6864602,"Uttarakhand":10086292,"Goa":1458545,"Tripura":3673917,
"Meghalaya":2966889,"Manipur":2855794,"Nagaland":1978502,"Arunachal Pradesh":1383727,
"Mizoram":1097206,"Sikkim":610577
};

const POP_UT = {
  "Delhi":16787941, "Jammu and Kashmir":12541302, "Ladakh":274000,
  "Chandigarh":1055450, "Puducherry":1247953, "Lakshadweep":64473,
  "Andaman and Nicobar Islands":380581, "Dadra and Nagar Haveli and Daman and Diu":586956
};

const TOTAL_850 = 850;
const UT_TOTAL = 35;
const STATE_TOTAL = TOTAL_850 - UT_TOTAL;
const SOUTH = ["Tamil Nadu","Kerala","Karnataka","Andhra Pradesh","Telangana"];
const EXCLUDE_SENSITIVITY = ["Delhi","Jammu and Kashmir"];

function allocate(pop,total){
  let sum=Object.values(pop).reduce((a,b)=>a+b,0);
  let base={},rem=[];
  for(let s in pop){
    let q=(pop[s]/sum)*total; base[s]=Math.floor(q); rem.push({s,frac:q-base[s]});
  }
  let left=total-Object.values(base).reduce((a,b)=>a+b,0);
  rem.sort((a,b)=>b.frac-a.frac);
  for(let i=0;i<left;i++) base[rem[i].s]++;
  return base;
}

function buildUTModel(popBase){
  let ratio = getRatio(popBase, STATE_TOTAL);
  return allocateUTSeats(POP_UT, ratio, UT_TOTAL);
}

function project2026(){
  let out={};
  for(let s in POP_2011){
    let g=1.18; if(s==="Uttar Pradesh"||s==="Bihar") g=1.25; if(s==="Tamil Nadu"||s==="Kerala") g=1.08;
    out[s]=Math.round(POP_2011[s]*g);
  }
  return out;
}

function allocateUTSeats(popUT, ratio, targetTotal){
  let base = {}; let rem = []; let used = 0;
  for(let s in popUT){
    base[s] = CURRENT[s] || 1; used += base[s];
    let q = popUT[s] / ratio; rem.push({s, frac: q});
  }
  let remaining = targetTotal - used;
  if(remaining < 0) return base;
  rem.sort((a,b)=>b.frac - a.frac);
  let i = 0;
  while(remaining > 0){ base[rem[i % rem.length].s]++; remaining--; i++; }
  return base;
}

function mergeStatesWithUTs(stateModel, utModel){
  let out = {};
  for(let s in CURRENT){
    if(stateModel && stateModel[s] !== undefined) out[s] = stateModel[s];
    else if(utModel && utModel[s] !== undefined) out[s] = utModel[s];
    else out[s] = CURRENT[s];
  }
  return out;
}

function computeShareExcludingDJK(data){
  let total = 0; let south = 0;
  for(let s in data){
    if(EXCLUDE_SENSITIVITY.includes(s)) continue;
    if(!(s in POP_2011)) continue;
    total += data[s]; if(SOUTH.includes(s)) south += data[s];
  }
  return { south: (south/total*100), north: (100 - (south/total*100)) };
}

function getRatio(pop, totalSeats){
  let sum = Object.values(pop).reduce((a,b)=>a+b,0);
  return sum / totalSeats;
}

const MODEL_2011_STATES = allocate(POP_2011,STATE_TOTAL);
const UT_2011 = buildUTModel(POP_2011);
const MODEL_2011 = mergeStatesWithUTs(MODEL_2011_STATES, UT_2011);

const POP_2026 = project2026();
const MODEL_2026_STATES = allocate(POP_2026,STATE_TOTAL);
const UT_2026 = buildUTModel(POP_2026);
const MODEL_2026 = mergeStatesWithUTs(MODEL_2026_STATES, UT_2026);

const CURRENT_STATES = {};
for(let s in CURRENT){ if(s in POP_2011) CURRENT_STATES[s] = CURRENT[s]; }
const UNIFORM_STATES = allocate(CURRENT_STATES, STATE_TOTAL);
const UT_UNIFORM = buildUTModel(POP_2011);
const UNIFORM = mergeStatesWithUTs(UNIFORM_STATES, UT_UNIFORM);

// ================== MAP ==================
const map = L.map('map',{zoomControl:true, attributionControl:false}).setView([22.5,80],5);
window.map = map;

setTimeout(()=> { if(window.map) window.map.invalidateSize(); }, 300);

const indiaBounds = [[6,68],[37,98]];
map.fitBounds(indiaBounds);
// Removed setMaxBounds to fix zooming bounces
map.setMinZoom(4); map.setMaxZoom(8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:7}).addTo(map);

let geoLayer;
let utLayer = L.layerGroup().addTo(map);
let labelLayer = L.layerGroup().addTo(map);
let labelTimer;

// Removed Andaman & Nicobar so it draws on the pure polygon
const UT_BOX={
"Delhi":[[28.4,76.9],[28.9,77.5]], "Chandigarh":[[30.6,76.7],[30.8,76.9]],
"Puducherry":[[11.8,79.7],[12.0,80.0]], "Lakshadweep":[[10.4,72.5],[10.8,72.8]],
"Ladakh":[[33.5,76],[35.5,79]], "Dadra and Nagar Haveli and Daman and Diu":[[20,72.8],[20.4,73.2]]
};

// Added Andaman & Nicobar center mapping specifically to force it directly onto the islands
const LABEL_CENTERS = {
  "Kerala": [10.5, 76.5], "West Bengal": [23.5, 87.8], "Andhra Pradesh": [16.0, 79.5],
  "Gujarat": [22.8, 71.5], "Tamil Nadu": [11.0, 78.5], "Maharashtra": [19.0, 76.0],
  "Andaman and Nicobar Islands": [11.5, 92.7] 
};

fetch('india_states.geojson').then(r=>r.json()).then(g=>{
  let glowLayer = L.geoJSON(g,{ style:{color:"#2c3e50", weight:8, opacity:0.12, fillOpacity:0} }).addTo(map);
  geoLayer = L.geoJSON(g,{
    onEachFeature:(f,l)=>{
      l.setStyle({color:"#333", weight:1, fillColor:"#ccc", fillOpacity:0.6});
      l.on('mouseover', function(){ this.setStyle({weight:3}); });
      l.on('mouseout', function(){ this.setStyle({weight:1}); });
    }
  }).addTo(map);
  glowLayer.bringToBack();

  document.getElementById("lang").value = detectLanguage();
  updateMap(false);
  map.off("zoomend");
  map.on("zoomend", function(){ updateMap(false); });

  document.getElementById("mode").addEventListener("change", ()=>updateMap(true));
  document.getElementById("lang").addEventListener("change", ()=>updateMap(true));

  if(window.innerWidth < 768) initDragPanel();
  requestAnimationFrame(()=> { if(window.map) window.map.invalidateSize(); });
});

function getData(m){
  if(m==="current") return CURRENT; if(m==="uniform") return UNIFORM;
  if(m==="y2011") return MODEL_2011; return MODEL_2026;
}

function getLabel(m){
  return m==="current"?"Current": m==="uniform"?"Uniform": m==="y2011"?"2011 Census":"2026 Projection";
}

function getLabelTelugu(m){
  return m==="current"?"ప్రస్తుతం": m==="uniform"?"సమాన పంపిణీ": m==="y2011"?"2011 లెక్కలు":"2026 అంచనా";
}

function setLang(lang){
  localStorage.setItem("lang", lang);
  document.getElementById("lang").value = lang;
  updateMap(false);
}

function formatTop(list, color){
  return list.map((x,i)=>{
    let badge = "";
    if(i === 0) badge = "🥇"; else if(i === 1) badge = "🥈"; else if(i === 2) badge = "🥉";
    let arrow = x.diff > 0 ? "▲" : x.diff < 0 ? "▼" : "•";
    let prefix = badge ? `${badge} ${i+1}.` : `${i+1}.`;
    return `${prefix} ${t(x.s)} <span style="color:${color}; font-weight:600">${arrow} ${x.diff>=0?"+":""}${x.diff}</span>`;
  }).join("<br>");
}

function detectLanguage(){
  let saved = localStorage.getItem("lang");
  if(saved) return saved;
  let browserLang = navigator.language || navigator.userLanguage;
  if(browserLang && browserLang.toLowerCase().startsWith("te")) return "te";
  return "en";
}

function addLabels(data){
  labelLayer.clearLayers();
  let zoom = map.getZoom();
  let seen = new Set(); 
  let lang = document.getElementById("lang")?.value || "en";

  // 1. Draw UT Box labels first (if zoomed in)
  if(zoom >= 6){
    for(let s in UT_BOX){
      seen.add(s);
      let bounds = UT_BOX[s];
      let center = [(bounds[0][0] + bounds[1][0]) / 2, (bounds[0][1] + bounds[1][1]) / 2];
      let fontSize = zoom >= 6 ? "11px" : "9px";
      
      let primary = lang === "te" ? t(s) : s;
      let secondary = lang === "te" ? s : t(s);
      let name = `${primary}<br><span style="font-size:10px; opacity:0.8">${secondary}</span>`;
      
      let val = data[s] || 0;
      let label = L.marker(center,{
        interactive:false,
        icon: L.divIcon({
          className:"ut-label",
          html: `<div style="text-align:center; font-weight:600; font-size:${fontSize}; color:#000; text-shadow:0 0 4px #fff;">${name}<br><b>${val}</b></div>`
        })
      });
      labelLayer.addLayer(label);
    }
  }

  // 2. Draw standard state labels
  geoLayer.eachLayer(layer=>{
    let raw = layer.feature.properties.ST_NM || layer.feature.properties.NAME_1;
    let s = normalizeName(raw);

    // Prevents duplicates (fixes 0-seats split polygon bugs)
    if(seen.has(s)) return; 
    seen.add(s);

    let center;
    if(LABEL_CENTERS[s]) { center = L.latLng(LABEL_CENTERS[s][0], LABEL_CENTERS[s][1]); } 
    else { try { center = layer.getBounds().getCenter(); } catch(e) { return; } }
    if(!center) return;

    let fontSize = zoom >= 6 ? "12px" : "10px";
    let val = data[s] || 0;

    let primary = lang === "te" ? t(s) : s;
    let secondary = lang === "te" ? s : t(s);
    let name = zoom < 6 ? primary : `${primary}<br><span style="font-size:10px; opacity:0.8">${secondary}</span>`;

    let label = L.marker(center,{
      interactive:false,
      icon: L.divIcon({
        className:"state-label",
        html: `<div style="text-align:center; font-weight:600; font-size:${fontSize}; color:#111; text-shadow:0 0 4px rgba(255,255,255,0.9); line-height:1.2;">${name}<br><b>${val}</b></div>`
      })
    });
    labelLayer.addLayer(label);
  });
}

function updateMap(flag){
  if(window._updating) return;
  window._updating = true;
  setTimeout(()=> window._updating = false, 0);

  let mode = document.getElementById("mode").value;
  let data = getData(mode);
  let lang = document.getElementById("lang")?.value || "en";
  let u = ui();

  let diffs = [];
  for(let s in data){
    if(!(s in POP_2011)) continue; 
    let baseVal = (mode==="uniform") ? CURRENT[s] : UNIFORM[s];
    let d = (data[s]||0) - (baseVal||0);
    diffs.push({s: s, diff: d});
  }
  diffs.sort((a,b) => b.diff - a.diff);
  let topGainers = diffs.slice(0,3);
  let topLosers = [...diffs].reverse().slice(0,3);
  let biggestGain = topGainers[0]?.s || "";
  let biggestLoss = topLosers[0]?.s || "";

  geoLayer.eachLayer(layer=>{
    let raw = layer.feature.properties.ST_NM || layer.feature.properties.NAME_1;
    let s = normalizeName(raw);
    let val = data[s] || 0;
    let diff = null, shareDelta = null;

    if(mode==="uniform") diff = val-(CURRENT[s]||0);
    else if(mode==="y2011" || mode==="y2026"){
      diff = val-(UNIFORM[s]||0);
      shareDelta = ((val/850)-(UNIFORM[s]/850))*100;
    }

    let dynamicBorder = diff > 0 ? "#00c853" : diff < 0 ? "#1e88e5" : "#999";

    if(flag){
      layer.setStyle({fillOpacity:0.3});
      setTimeout(()=>{ layer.setStyle({fillColor:getColor(s), fillOpacity:0.8, color:dynamicBorder, weight:3}); },120);
    } else {
      layer.setStyle({fillColor:getColor(s), fillOpacity:0.8, color:dynamicBorder, weight:3});
    }

    let modelLabelText = lang==="te" ? getLabelTelugu(mode) : getLabel(mode);
    let primary = lang === "te" ? t(s) : s;
    
    let tip = `<b>${primary}</b><br>${u.seats}: ${val}<br>${u.modelLabel}: ${modelLabelText}`;
    if(mode==="uniform") tip += `<br>${u.deltaCurrent}: ${diff>=0?"+":""}${diff}`;
    else if(mode==="y2011" || mode==="y2026"){
      tip += `<br>${u.deltaUniform}: ${diff>=0?"+":""}${diff}`;
      tip += `<br>${u.share}: ${(val/850*100).toFixed(2)}%`;
      tip += `<br>${u.shareDelta}: ${shareDelta.toFixed(2)}%`;
    }
    layer.bindTooltip(tip,{sticky:true});
  });

  utLayer.clearLayers();
  for(let s in UT_BOX){
    let val = data[s] || 0;
    let primary = lang === "te" ? t(s) : s;
    let rect = L.rectangle(UT_BOX[s],{ color:"#333", weight:2, fillColor:getColor(s), fillOpacity:0.8 }).addTo(utLayer);
    rect.bindTooltip(`<b>${primary}</b><br>${u.seats}: ${val}`,{sticky:true});
  }

  clearTimeout(labelTimer);
  labelTimer = setTimeout(()=>{ addLabels(data); }, 120);

  let total = (mode==="current")?543:850;
  document.body.classList.remove("lang-te");
  if(lang === "te") document.body.classList.add("lang-te");

  document.getElementById("insightsTitle").innerText = "🔥 " + u.gain;
  document.getElementById("topMoversTitle").innerText = "🏆 " + u.gainers;
  document.getElementById("shareTitle").innerHTML = "📊 " + u.shareTitle;
  document.getElementById("voteTitle").innerHTML = "⚖️ " + u.vote;
  document.getElementById("validationTitle").innerHTML = "🧪 " + u.validation;
  document.getElementById("legendBox").innerHTML = `<div>🟢 ${u.legendGain}</div><div>🔵 ${u.legendLoss}</div><div>🎨 ${u.legendFill}</div><div class="small">${u.legendBase}</div>`;
  document.getElementById("totals").innerHTML = `<b>${u.total}:</b> ${total}`;
  document.getElementById("modelName").innerHTML = `<b>${u.model}:</b> ${lang==="te" ? getLabelTelugu(mode) : getLabel(mode)}`;

  document.getElementById("insights").innerHTML = `${u.gain}: <span class="badge">${t(biggestGain)}</span><br>${u.loss}: <span class="badge">${t(biggestLoss)}</span>`;

  if(mode !== "current"){
    document.getElementById("topMovers").innerHTML = "<b>" + u.gainers + "</b><br>" + formatTop(topGainers, "#00c853") + "<hr>" + "<b>" + u.losers + "</b><br>" + formatTop(topLosers, "#1e88e5");
  } else {
    document.getElementById("topMovers").innerHTML = "";
  }

  let south = 0; let sum = 0;
  for(let s in data){ if(!(s in POP_2011)) continue; sum+=data[s]; if(SOUTH.includes(s)) south+=data[s]; }
  let share = (south/sum*100);
  let sens = computeShareExcludingDJK(data);

  document.getElementById("share").innerHTML = "<b>" + u.standard + "</b><br>" + u.south + ": " + share.toFixed(1) + "%<br>" + u.north + ": " + (100-share).toFixed(1) + "%<hr>" + "<b>" + u.sensitivity + "</b><br>" + u.south + ": " + sens.south.toFixed(1) + "%<br>" + u.north + ": " + sens.north.toFixed(1) + "%";

  let up = Math.round(project2026()["Uttar Pradesh"]/(data["Uttar Pradesh"]||1));
  let kl = Math.round(project2026()["Kerala"]/(data["Kerala"]||1));

  document.getElementById("vote").innerHTML = "<b>" + u.vote + "</b><br>" + "UP MP ≈ " + up.toLocaleString() + "<br>" + "Kerala MP ≈ " + kl.toLocaleString();

  let check = 0;
  for(let s in data) check += data[s];
  let expected = (mode==="current") ? 543 : 850;
  let ok = check===expected ? "✔" : "❌";
  document.getElementById("validation").innerHTML = u.validation + ": " + check + " / " + expected + " " + ok;
} 

// Smooth Bottom Sheet drag logic for Mobile App
function initDragPanel(){
  const panel = document.getElementById("panel");
  if(!panel) return;
  let startY = 0; let currentY = 0; let isDragging = false;
  
  let panelHeight = window.innerHeight * 0.75;
  let peek = 80; 
  let collapsed = panelHeight - peek; 
  let expanded = 0;
  let currentTranslate = collapsed;
  
  function setTranslate(y){ panel.style.transform = `translateY(${y}px)`; }
  
  // Creates an invisible drag layer safely layered over just the top section 
  let dragTarget = document.createElement("div");
  dragTarget.style.position = "absolute"; dragTarget.style.top = "0"; dragTarget.style.left = "0";
  dragTarget.style.width = "100%"; dragTarget.style.height = "60px"; dragTarget.style.zIndex = "10";
  panel.appendChild(dragTarget);

  function onStart(e){ 
    if(panel.scrollTop > 5 && e.type === "touchstart") return;
    isDragging = true; startY = e.touches ? e.touches[0].clientY : e.clientY; panel.style.transition = "none"; 
  }
  function onMove(e){
    if(!isDragging) return;
    currentY = e.touches ? e.touches[0].clientY : e.clientY;
    let delta = currentY - startY; let next = currentTranslate + delta;
    if(next < expanded) next = expanded; if(next > collapsed) next = collapsed;
    setTranslate(next);
  }
  function onEnd(e){
    if(!isDragging) return; isDragging = false; panel.style.transition = "transform 0.3s ease";
    let delta = currentY - startY; let final = currentTranslate + delta; 
    let snap = (final > collapsed / 2) ? collapsed : expanded;
    if(delta > 40) snap = collapsed; else if(delta < -40) snap = expanded;
    currentTranslate = snap; setTranslate(snap);
  }
  
  dragTarget.addEventListener("touchstart", onStart, {passive: true}); 
  window.addEventListener("touchmove", onMove, {passive: false}); 
  window.addEventListener("touchend", onEnd);
  dragTarget.addEventListener("mousedown", onStart); 
  window.addEventListener("mousemove", onMove); 
  window.addEventListener("mouseup", onEnd);
}

// Handles toggle button on Desktop Widths
document.addEventListener("DOMContentLoaded", function(){
  const btn = document.getElementById("toggleBtn");
  if(!btn) return;

  btn.onclick = function(){
    if(window.innerWidth < 768) return; 
    document.body.classList.toggle('panel-collapsed');
    const isHidden = document.body.classList.contains('panel-collapsed');
    btn.innerHTML = isHidden ? "➡" : "⬅";
    setTimeout(()=>{ if(window.map) window.map.invalidateSize(); }, 250);
  };
});
